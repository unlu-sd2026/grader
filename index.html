<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard — SD 2026</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            padding: 2rem;
        }
        h1 {
            color: #58a6ff;
            font-size: 1.8rem;
            margin-bottom: 0.3rem;
        }
        .subtitle {
            color: #8b949e;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: #161b22;
            border-radius: 8px;
            overflow: hidden;
        }
        th {
            background: #21262d;
            padding: 12px 16px;
            text-align: left;
            font-weight: 600;
            color: #58a6ff;
            font-size: 0.85rem;
            text-transform: uppercase;
        }
        td {
            padding: 10px 16px;
            border-top: 1px solid #21262d;
            font-size: 0.9rem;
        }
        tr:hover { background: #1c2128; }
        .rank { width: 50px; text-align: center; color: #8b949e; }
        .student { font-weight: 600; }
        .avg { font-weight: 700; color: #f0f6fc; }
        .pass { color: #3fb950; }
        .fail { color: #f85149; }
        .late { color: #d29922; }
        .pending { color: #484f58; }
        .footer {
            margin-top: 1.5rem;
            color: #484f58;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

        <tr>

</html>
